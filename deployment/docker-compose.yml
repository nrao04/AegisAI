version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: aegis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aegisai
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegisai"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: aegis-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  kafka:
    image: apache/kafka:latest
    container_name: aegis-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: aegis-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://aegis:aegis@postgres:5432/aegisai
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX: incidents
      KAFKA_BOOTSTRAP: kafka:29092
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
      kafka: { condition: service_started }

  log-consumer:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: aegis-log-consumer
    restart: unless-stopped
    command: ["python", "-m", "services.log_consumer"]
    environment:
      DATABASE_URL: postgresql://aegis:aegis@postgres:5432/aegisai
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX: incidents
      KAFKA_BOOTSTRAP: kafka:29092
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    depends_on:
      postgres: { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
      kafka: { condition: service_started }

  frontend:
    image: nginx:alpine
    container_name: aegis-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  es_data:
