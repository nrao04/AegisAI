name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: aegisai
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aegis -d aegisai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://aegis:aegis@localhost:5432/aegisai
      ELASTICSEARCH_URL: http://localhost:9200
      KAFKA_BOOTSTRAP: localhost:9092

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --tb=short
